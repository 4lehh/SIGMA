version: '3.8'

services:
  server:
    build: ./server
    container_name: sigma_server
    volumes:
      - ./server:/app
    ports:
      - "9001:9001"
    restart: always
    environment:
      - PYTHONUNBUFFERED=1

  sensor:
    build: ./sensor
    container_name: sigma_sensor
    volumes:
      - ./sensor:/app
    depends_on:
      - server
      - dashboard
    stdin_open: true
    tty: true
    environment:
      - PYTHONUNBUFFERED=1
      # El sensor enviará también al dashboard (puerto 9002)
      - DASHBOARD_HOST=dashboard
      - DASHBOARD_PORT=9002

  dashboard:
    build: ./dashboard
    container_name: sigma_dashboard
    volumes:
      - ./dashboard:/app
    ports:
      - "8080:8080"    # Dashboard web
      - "8765:8765"    # WebSocket
      - "9002:9002/udp"  # UDP sniffer
    restart: always
    environment:
      - PYTHONUNBUFFERED=1