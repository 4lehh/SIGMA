<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SIGMA — Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600&display=swap');

  :root {
    --bg:        #0b0f0c;
    --surface:   #111a14;
    --border:    #1e3024;
    --green:     #2aff7a;
    --green-dim: #1a7a42;
    --amber:     #ffb830;
    --red:       #ff4f4f;
    --text:      #c8e0cc;
    --muted:     #4a6650;
    --radius:    6px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 28px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .logo {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 18px;
    font-weight: 600;
    color: var(--green);
    letter-spacing: 3px;
  }

  .logo span { color: var(--muted); font-weight: 400; }

  .status-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 14px;
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--muted);
    transition: background .3s;
  }
  .dot.live { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s infinite; }
  .dot.error { background: var(--red); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: .4; }
  }

  /* ── Layout ── */
  main {
    padding: 28px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  #no-data {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 80px;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
    border: 1px dashed var(--border);
    border-radius: var(--radius);
  }

  #no-data svg { opacity: .3; }

  /* ── Grid de sensores ── */
  #sensors-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 16px;
  }

  /* ── Tarjeta de sensor ── */
  .sensor-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color .3s;
  }

  .sensor-card.updated { border-color: var(--green-dim); }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
  }

  .card-title {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 600;
    color: var(--green);
    letter-spacing: 1px;
  }

  .room-badge {
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
    padding: 3px 10px;
    border-radius: 20px;
    border: 1px solid;
  }

  .room-0 { color: #7bf5a8; border-color: #2a6644; }
  .room-1 { color: #a3d977; border-color: #4a7a2a; }
  .room-2 { color: #ffdd6b; border-color: #7a6620; }

  .card-body { padding: 16px 18px; display: flex; flex-direction: column; gap: 14px; }

  /* ── Métricas ── */
  .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .metric {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px 14px;
  }

  .metric-label {
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--muted);
    letter-spacing: .5px;
    margin-bottom: 6px;
    text-transform: uppercase;
  }

  .metric-value {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    line-height: 1;
    transition: color .3s;
  }

  .metric-unit {
    font-size: 11px;
    color: var(--muted);
    margin-left: 3px;
  }

  /* VPD ocupa todo el ancho */
  .metric.full { grid-column: 1 / -1; }

  /* ── VPD Bar ── */
  .vpd-bar-wrap { margin-top: 8px; }

  .vpd-bar-track {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
    position: relative;
  }

  .vpd-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width .6s ease, background .6s ease;
  }

  .vpd-labels {
    display: flex;
    justify-content: space-between;
    font-size: 9px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--muted);
    margin-top: 4px;
  }

  .vpd-status {
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
    margin-top: 6px;
  }

  /* ── Timestamp ── */
  .card-footer {
    padding: 8px 18px;
    border-top: 1px solid var(--border);
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--muted);
    display: flex;
    justify-content: space-between;
  }

  /* ── Mini chart (sparkline) ── */
  .sparkline { width: 100%; height: 40px; }

  /* ── Actuadores ── */
  .actuators-section { }

  .actuators-label {
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--muted);
    letter-spacing: .5px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .actuators {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }

  .actuator {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 8px;
    text-align: center;
    transition: border-color .3s, background .3s;
  }

  .actuator.active {
    border-color: var(--green-dim);
    background: #0d1f12;
  }

  .actuator-icon { font-size: 16px; line-height: 1; }
  .actuator-name {
    font-size: 9px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--muted);
    margin-top: 4px;
  }

  .actuator-val {
    font-size: 11px;
    font-family: 'IBM Plex Mono', monospace;
    color: var(--text);
    margin-top: 2px;
    transition: color .3s;
  }

  .actuator.active .actuator-val { color: var(--green); }

  /* ── Log panel ── */
  #log-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }

  .log-header {
    padding: 12px 18px;
    border-bottom: 1px solid var(--border);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  #log-entries {
    padding: 12px 18px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-height: 180px;
    overflow-y: auto;
  }

  .log-entry {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    display: flex;
    gap: 12px;
  }

  .log-entry .ts { color: var(--green-dim); min-width: 56px; }
  .log-entry .msg { color: var(--text); }
</style>
</head>
<body>

<header>
  <div class="logo">SIGMA <span>/ GREENHOUSE MONITOR</span></div>
  <div class="status-pill">
    <div class="dot" id="conn-dot"></div>
    <span id="conn-label">Conectando…</span>
  </div>
</header>

<main>
  <div id="no-data">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
      <path d="M12 6v6l4 2"/>
    </svg>
    Esperando datos de sensores…
  </div>

  <div id="sensors-grid" style="display:none"></div>

  <div id="log-panel" style="display:none">
    <div class="log-header">— Actividad reciente</div>
    <div id="log-entries"></div>
  </div>
</main>

<script>
// ── Configuración WebSocket ──────────────────────────────────────────────────
const WS_URL = `ws://${location.hostname}:8765`;
const MAX_HISTORY = 30;
const MAX_LOGS    = 50;

// ── Estado ───────────────────────────────────────────────────────────────────
const history = {};   // { sensorId: [{ temp, humidity, vpd, ts }] }
let ws;

// ── Helpers ──────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);

// Convierte "Sensor N°1" → "sensor-n-1" (seguro para usar en IDs del DOM)
const safeId = str => str.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');

function vpdColor(vpd) {
  if (vpd < 0.4)  return '#5b9fff';   // muy bajo — azul
  if (vpd <= 0.8) return '#2aff7a';   // óptimo  — verde
  if (vpd <= 1.2) return '#ffb830';   // alto    — ámbar
  return '#ff4f4f';                   // crítico — rojo
}

function vpdStatus(vpd, roomType) {
  const ranges = { 0: [0.8, 1.0], 1: [1.0, 1.2], 2: [1.0, 1.2] };
  const [lo, hi] = ranges[roomType] ?? [0.8, 1.2];
  if (vpd < lo)  return { text: '▼ VPD bajo',   color: '#5b9fff' };
  if (vpd > hi)  return { text: '▲ VPD alto',   color: '#ff4f4f' };
  return { text: '● Rango óptimo', color: '#2aff7a' };
}

function sparklinePath(values, w, h) {
  if (values.length < 2) return '';
  const min = Math.min(...values);
  const max = Math.max(...values);
  const range = max - min || 0.01;
  const pts = values.map((v, i) => {
    const x = (i / (values.length - 1)) * w;
    const y = h - ((v - min) / range) * (h - 4) - 2;
    return `${x},${y}`;
  });
  return `M${pts.join('L')}`;
}

// ── Render sensor card ────────────────────────────────────────────────────────
function renderCard(s) {
  const id  = s.identificador;
  const hist = history[id] || [];
  const vpd  = s.VPD;
  const act  = s.actuators || { cooling: 0, heating: 0, humidifier: 0, light: 0 };

  const vpdPct   = Math.min((vpd / 2) * 100, 100).toFixed(1);
  const vpdCol   = vpdColor(vpd);
  const vpdSt    = vpdStatus(vpd, s.room_type);
  const tempHist = hist.map(h => h.temp);
  const spW = 260, spH = 40;
  const path = sparklinePath(tempHist, spW, spH);

  const actItems = [
    { key: 'cooling',    icon: '❄️', label: 'Cooling'  },
    { key: 'heating',    icon: '🔥', label: 'Heating'  },
    { key: 'humidifier', icon: '💧', label: 'Humid.'   },
    { key: 'light',      icon: '☀️', label: 'Luz'      },
  ];

  const actHTML = actItems.map(a => {
    const val = act[a.key] ?? 0;
    const active = val > 0 ? 'active' : '';
    return `<div class="actuator ${active}">
      <div class="actuator-icon">${a.icon}</div>
      <div class="actuator-name">${a.label}</div>
      <div class="actuator-val">${val.toFixed(2)}</div>
    </div>`;
  }).join('');

  const sid = safeId(id);
  return `
  <div class="sensor-card" id="card-${sid}">
    <div class="card-header">
      <div class="card-title">${id}</div>
      <div class="room-badge room-${s.room_type}">${s.room_label}</div>
    </div>
    <div class="card-body">
      <div class="metrics">
        <div class="metric">
          <div class="metric-label">Temp. Sala</div>
          <div class="metric-value" id="val-temp-${sid}">
            ${s.room_temp.toFixed(2)}<span class="metric-unit">°C</span>
          </div>
        </div>
        <div class="metric">
          <div class="metric-label">Humedad</div>
          <div class="metric-value" id="val-hum-${sid}">
            ${(s.humidity * 100).toFixed(1)}<span class="metric-unit">%</span>
          </div>
        </div>
        <div class="metric">
          <div class="metric-label">Temp. Hoja</div>
          <div class="metric-value" id="val-leaf-${sid}">
            ${s.leaf_temp.toFixed(2)}<span class="metric-unit">°C</span>
          </div>
        </div>
        <div class="metric">
          <div class="metric-label">VPD</div>
          <div class="metric-value" id="val-vpd-${sid}" style="color:${vpdCol}">
            ${vpd.toFixed(4)}<span class="metric-unit">kPa</span>
          </div>
        </div>
        <div class="metric full">
          <div class="metric-label">VPD — Déficit de presión de vapor</div>
          <div class="vpd-bar-wrap">
            <div class="vpd-bar-track">
              <div class="vpd-bar-fill" id="vpd-bar-${sid}"
                   style="width:${vpdPct}%; background:${vpdCol}"></div>
            </div>
            <div class="vpd-labels"><span>0.0</span><span>0.8</span><span>1.2</span><span>2.0+</span></div>
            <div class="vpd-status" id="vpd-st-${sid}" style="color:${vpdSt.color}">${vpdSt.text}</div>
          </div>
        </div>
      </div>

      ${path ? `
      <div>
        <div class="actuators-label">Temperatura — Historial</div>
        <svg class="sparkline" viewBox="0 0 ${spW} ${spH}" preserveAspectRatio="none">
          <path d="${path}" fill="none" stroke="${vpdCol}" stroke-width="1.5" opacity=".8"/>
        </svg>
      </div>` : ''}

      <div class="actuators-section">
        <div class="actuators-label">Actuadores</div>
        <div class="actuators" id="act-${sid}">${actHTML}</div>
      </div>
    </div>
    <div class="card-footer">
      <span>Última actualización: <span id="ts-${sid}">${s.timestamp}</span></span>
      <span>${hist.length} muestras</span>
    </div>
  </div>`;
}

// ── Actualizar card existente (sin re-render completo) ────────────────────────
function updateCard(s) {
  const id  = s.identificador;
  const sid = safeId(id);
  const vpd = s.VPD;
  const act = s.actuators || { cooling: 0, heating: 0, humidifier: 0, light: 0 };

  const vpdCol = vpdColor(vpd);
  const vpdSt  = vpdStatus(vpd, s.room_type);
  const vpdPct = Math.min((vpd / 2) * 100, 100).toFixed(1);

  const set = (elId, val) => { const el = document.getElementById(elId); if (el) el.innerHTML = val; };

  set(`val-temp-${sid}`, `${s.room_temp.toFixed(2)}<span class="metric-unit">°C</span>`);
  set(`val-hum-${sid}`,  `${(s.humidity * 100).toFixed(1)}<span class="metric-unit">%</span>`);
  set(`val-leaf-${sid}`, `${s.leaf_temp.toFixed(2)}<span class="metric-unit">°C</span>`);

  const vpdEl = document.getElementById(`val-vpd-${sid}`);
  if (vpdEl) {
    vpdEl.style.color = vpdCol;
    vpdEl.innerHTML = `${vpd.toFixed(4)}<span class="metric-unit">kPa</span>`;
  }

  const bar = document.getElementById(`vpd-bar-${sid}`);
  if (bar) { bar.style.width = `${vpdPct}%`; bar.style.background = vpdCol; }

  const st = document.getElementById(`vpd-st-${sid}`);
  if (st) { st.style.color = vpdSt.color; st.textContent = vpdSt.text; }

  set(`ts-${sid}`, s.timestamp);

  // Actuadores
  const actDiv = document.getElementById(`act-${sid}`);
  if (actDiv) {
    const items = [
      { key: 'cooling', icon: '❄️', label: 'Cooling' },
      { key: 'heating', icon: '🔥', label: 'Heating' },
      { key: 'humidifier', icon: '💧', label: 'Humid.' },
      { key: 'light', icon: '☀️', label: 'Luz' },
    ];
    actDiv.innerHTML = items.map(a => {
      const val = act[a.key] ?? 0;
      return `<div class="actuator ${val > 0 ? 'active' : ''}">
        <div class="actuator-icon">${a.icon}</div>
        <div class="actuator-name">${a.label}</div>
        <div class="actuator-val">${val.toFixed(2)}</div>
      </div>`;
    }).join('');
  }

  // Sparkline
  const hist = (history[id] || []).map(h => h.temp);
  const spW = 260, spH = 40;
  const path = sparklinePath(hist, spW, spH);
  const svg = document.querySelector(`#card-${sid} .sparkline`);
  if (svg && path) svg.innerHTML = `<path d="${path}" fill="none" stroke="${vpdCol}" stroke-width="1.5" opacity=".8"/>`;

  // Flash borde
  const card = document.getElementById(`card-${sid}`);
  if (card) {
    card.classList.add('updated');
    setTimeout(() => card.classList.remove('updated'), 800);
  }
}

// ── Procesar mensaje ──────────────────────────────────────────────────────────
function processSensor(s) {
  const id = s.identificador;
  if (!history[id]) history[id] = [];
  history[id].push({ temp: s.room_temp, hum: s.humidity, vpd: s.VPD, ts: s.timestamp });
  if (history[id].length > MAX_HISTORY) history[id].shift();

  const grid = $('sensors-grid');
  const noData = $('no-data');
  const logPanel = $('log-panel');

  if (document.getElementById(`card-${safeId(id)}`)) {
    updateCard(s);
  } else {
    grid.style.display = 'grid';
    noData.style.display = 'none';
    logPanel.style.display = 'block';
    grid.insertAdjacentHTML('beforeend', renderCard(s));
  }

  // Log
  addLog(`${s.identificador} — T:${s.room_temp.toFixed(2)}°C  H:${(s.humidity*100).toFixed(1)}%  VPD:${s.VPD.toFixed(4)}`);
}

function addLog(msg) {
  const el = $('log-entries');
  const now = new Date().toTimeString().slice(0, 8);
  el.insertAdjacentHTML('afterbegin',
    `<div class="log-entry"><span class="ts">${now}</span><span class="msg">${msg}</span></div>`);
  while (el.children.length > MAX_LOGS) el.removeChild(el.lastChild);
}

// ── WebSocket ─────────────────────────────────────────────────────────────────
function connect() {
  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    $('conn-dot').className   = 'dot live';
    $('conn-label').textContent = 'En vivo';
  };

  ws.onmessage = ({ data }) => {
    const msg = JSON.parse(data);
    if (msg.type === 'snapshot') {
      Object.values(msg.data).forEach(processSensor);
    } else if (msg.type === 'update') {
      processSensor(msg.sensor);
    }
  };

  ws.onclose = () => {
    $('conn-dot').className   = 'dot error';
    $('conn-label').textContent = 'Sin conexión — reintentando…';
    setTimeout(connect, 3000);
  };

  ws.onerror = () => ws.close();
}

connect();
</script>
</body>
</html>
