<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SIGMA — Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">SIGMA <span>/ SIGMA MONITOR </span></div>
  <div class="status-pill">
    <div class="dot" id="conn-dot"></div>
    <span id="conn-label">Conectando…</span>
  </div>
</header>

<main>
  <div id="no-data">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2z"/>
      <path d="M12 6v6l4 2"/>
    </svg>
    Esperando datos de sensores…
  </div>

  <div id="sensors-grid" style="display:none"></div>

  <div id="chart-container" style="display:none">
    <div class="chart-header">
      <span>Evolución VPD (kPa)</span>
    </div>
    <div style="position: relative; height: 200px; width: 100%;">
      <canvas id="vpdChart"></canvas>
    </div>
  </div>

  <div id="log-panel" style="display:none">
    <div class="log-header">— Actividad reciente</div>
    <div id="log-entries"></div>
  </div>
</main>

<script src="app.js"></script>
</body>
</html>
